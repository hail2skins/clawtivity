name: Go-test
on: [push, pull_request]

jobs:
  go-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version-file: 'go.mod'

      - name: Install templ
        shell: bash
        run: go install github.com/a-h/templ/cmd/templ@latest
      - name: Run templ generate
        shell: bash
        run: templ generate -path .

      - name: Build
        run: go build -v ./...
      - name: Test with the Go CLI
        run: go test ./...

  node-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install plugin dependencies
        working-directory: plugins/clawtivity-activity
        run: npm install
      - name: Run plugin Node.js tests
        working-directory: plugins/clawtivity-activity
        run: npm test

  python-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run Python utility tests
        working-directory: skills/clawtivity/scripts
        run: python -m unittest
